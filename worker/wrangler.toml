name = "pitchora"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# --- 設定はCloudflareダッシュボードの Workers & Pages > pitchora > Settings
# から行ってください（コードでの設定は避け、GUIだけで完結させる方針）。
#
# DB（Neon Postgres）は D1 ではなく外部サービスなので Bindings ではなく
# Settings > Variables and Secrets で以下を追加してください：
#   - DATABASE_URL（Secret）: Neonダッシュボードで発行される接続文字列
#     例: postgres://user:password@ep-xxxx.neon.tech/neondb?sslmode=require
#   - JWT_SECRET（Secret）: ランダムな長い文字列（32文字以上推奨）
#   - ALLOWED_ORIGIN（Variable）: フロントエンド（Vercel）のURL
#
# KVは現時点のコードでは使用していません。将来使う場合は、実際にKV Namespaceを
# ダッシュボードで作成したうえで、Settings > Bindings から "SESSIONS" という
# Variable nameで追加してください（このファイルへの追記は不要です。
# Git連携デプロイではこのファイルの内容がダッシュボード側の設定より優先されるため、
# 存在しないIDをここに書くとデプロイが失敗します）。
