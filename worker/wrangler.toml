name = "pitchora-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# --- 以下はダッシュボードの Workers & Pages > pitchora-api > Settings
# からも同じ内容を設定できます（コードを触らずにGUIだけで完結させたい場合はこちら推奨）。
#
# DB（Neon Postgres）は D1 ではなく外部サービスなので Bindings ではなく
# Settings > Variables and Secrets で以下を追加してください：
#   - DATABASE_URL（Secret）: Neonダッシュボードで発行される接続文字列
#     例: postgres://user:password@ep-xxxx.neon.tech/neondb?sslmode=require
#   - JWT_SECRET（Secret）: ランダムな長い文字列（32文字以上推奨）
#   - ALLOWED_ORIGIN（Variable）: フロントエンド（Vercel）のURL
#
# KV を使う場合（任意・将来のレート制限やセッション管理用）は
# Settings > Bindings で Variable name "SESSIONS" として追加できます。
# ダッシュボードだけで完結させる場合、下記 [[kv_namespaces]] セクションは
# 無視して構いません（Gitリポジトリ連携時のみ参照されます）。

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
